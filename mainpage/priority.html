<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priority - vFAST</title>
    <link rel="stylesheet" href="sidebar.css">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="notification.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="light-theme">
    <div class="layout">
        <div id="sidebar-placeholder"></div>

        <main class="main-content">
            <header class="top-bar">
                <h1 class="page-title">Priority</h1>
                <div class="user-info">
                    <span class="user-name" id="userName">...</span>
                    <div class="user-avatar" id="userAvatar">
                        <img src="" alt="Profile" id="imgAvatar" style="display:none;">
                        <span id="textAvatar">..</span>
                    </div>
                </div>
            </header>

            <div class="notification-container">
                <div class="notification-header">
                    <div>
                        <h2 class="notification-title">Priority Ranking</h2>
                        <p class="notification-subtitle">ลำดับความสำคัญของงานที่ต้องทำ (#1 คือด่วนที่สุด)</p>
                    </div>
                </div>

                <section class="noti-section" id="sectionPriority">
                    <div class="noti-list" id="listPriority"></div>
                </section>
            </div>
        </main>

        <div class="overlay" id="overlay" aria-hidden="true"></div>
    </div>

    <script src="priority.js" type="module"></script>
</body>
</html>
