<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="light-theme">
    <div class="layout">
        <!-- Two-Stage Collapsible Sidebar (Original Purple) -->
        <nav class="sidebar" id="sidebar" aria-label="Main Navigation">
            <div class="sidebar__header">
                <button class="sidebar__toggle" id="sidebarToggle" aria-label="Toggle Sidebar">
                    <svg class="icon-hamburger" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    <svg class="icon-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"></path></svg>
                </button>
            </div>
            
            <ul class="sidebar__nav">
                <li class="sidebar__item">
                    <a href="#" class="sidebar__link sidebar__link--active" id="btnHome">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
                        <span class="sidebar__label" id="labelHome">Home</span>
                    </a>
                </li>
                <li class="sidebar__item">
                    <a href="#" class="sidebar__link" id="btnTask">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
                        <span class="sidebar__label" id="labelTask">Task</span>
                    </a>
                </li>
                <li class="sidebar__item">
                    <a href="#" class="sidebar__link" id="btnNoti">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                        <span class="sidebar__label" id="labelNoti">Notification</span>
                    </a>
                </li>
            </ul>
            
            <div class="sidebar__footer">
                <a href="#" class="sidebar__link" id="btnSettings">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    <span class="sidebar__label" id="labelSettings">Settings</span>
                </a>
                <a href="#" class="sidebar__link" id="btnLogout">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    <span class="sidebar__label" id="labelLogout">Log out</span>
                </a>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content" id="mainContent">
            <header class="top-bar">
                <h1 class="page-title" id="pageTitle">...</h1>
                <div class="user-info">
                    <span class="user-name" id="userName">...</span>
                    <div class="user-avatar">..</div>
                </div>
            </header>

            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <h3 class="stat-card__title">ภาระงานทั้งหมด</h3>
                    <p class="stat-card__value" id="statTotal">0</p>
                </div>
                <div class="stat-card">
                    <h3 class="stat-card__title">กำหนดส่งเร็วๆ นี้</h3>
                    <p class="stat-card__value" id="statUpcoming">0</p>
                </div>
                <div class="stat-card">
                    <h3 class="stat-card__title">เสร็จสิ้นแล้ว</h3>
                    <p class="stat-card__value" id="statCompleted">0</p>
                </div>
            </div>

            <div class="board">
                <div class="board__header">
                    <h2 class="board__title" id="boardHeader">...</h2>
                    <div class="board__controls">
                        <select class="sort-select" id="sortSelect">
                            <option value="due">Sort: Due date</option>
                            <option value="name">Sort: Name</option>
                        </select>
                        <button class="btn-primary" id="btnOpenAddTask">+ Add Task</button>
                    </div>
                </div>

                <!-- Backlog Section (Collapsible) -->
                <section class="board__section" id="sectionBacklog">
                    <div class="section-header section-header--collapsible" id="toggleBacklog">
                        <h3 class="section-title">Backlog</h3>
                        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"></polyline></svg>
                    </div>
                    <div class="task-list" id="listBacklog">
                        <!-- Backlog tasks will be injected here -->
                    </div>
                </section>

                <!-- Doing Section (Collapsible) -->
                <section class="board__section" id="sectionDoing">
                    <div class="section-header section-header--collapsible" id="toggleDoing">
                        <h3 class="section-title">Doing</h3>
                        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"></polyline></svg>
                    </div>
                    <div class="task-list" id="listDoing">
                        <!-- Doing tasks will be injected here -->
                    </div>
                </section>

                <!-- Completed Section (Collapsible) -->
                <section class="board__section board__section--completed" id="sectionCompleted">
                    <div class="section-header section-header--collapsible" id="toggleCompleted">
                        <h3 class="section-title">Completed tasks (<span id="countCompleted">0</span>)</h3>
                        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"></polyline></svg>
                    </div>
                    <div class="task-list task-list--collapsible" id="listCompleted">
                        <!-- Completed tasks will be injected here -->
                    </div>
                </section>
            </div>
        </main>

        <div class="overlay" id="overlay" aria-hidden="true"></div>
    </div>

    <!-- Task Card Template (Hidden) -->
    <template id="taskTemplate">
        <div class="task-card">
            <div class="task-card__status">
                <select class="status-dropdown" aria-label="Change status">
                    <option value="0">Backlog</option>
                    <option value="1">Doing</option>
                    <option value="2">Completed</option>
                </select>
            </div>
            <div class="task-card__content">
                <div class="task-card__header">
                    <h4 class="task-card__title">Task Title</h4>
                    <span class="task-card__date">Date</span>
                </div>
                <div class="task-card__tags">
                    <!-- Tags will be injected here -->
                </div>
            </div>
        </div>
    </template>

    <!-- Add Task Sidebar (Right) -->
    <aside class="add-task-sidebar" id="addTaskSidebar" aria-label="Add new task sidebar">
        <div class="add-task-sidebar__header">
            <h2 class="add-task-sidebar__title">Add new task</h2>
            <button class="btn-close" id="btnCloseAddTask" aria-label="Close">&times;</button>
        </div>
        
        <div class="add-task-sidebar__body">
            <div class="form-group">
                <label class="form-label">ชื่องาน</label>
                <input type="text" class="form-input" id="inputTaskName" placeholder="เช่น Algorithm Dijkstra exercise">
            </div>
            
            <div class="form-group">
                <label class="form-label">Tag</label>
                <div class="tag-selector" id="tagSelector">
                    <span class="tag tag--assign tag--selectable">Assign</span>
                    <span class="tag tag--project tag--selectable">Project</span>
                    <span class="tag tag--detail tag--selectable">Detail</span>
                    <span class="tag tag--design tag--selectable">Design</span>
                </div>
                <button class="btn-dashed" id="btnNewTag">+ New tag</button>
            </div>
            
            <div class="form-group">
                <label class="form-label">Due date</label>
                <input type="date" class="form-input" id="inputTaskDate">
            </div>
            
            <div class="form-group">
                <label class="form-label">แนบไฟล์ (ถ้ามี)</label>
                <div class="upload-area" id="uploadArea">
                    <input type="file" id="fileInput" style="display: none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
                    <span id="uploadText">อัปโหลดไฟล์</span>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">หมายเหตุ</label>
                <textarea class="form-input form-textarea" id="inputTaskNote" placeholder="คำอธิบายงาน..." rows="4"></textarea>
            </div>
        </div>
        
        <div class="add-task-sidebar__footer">
            <span class="add-task-sidebar__date" id="sidebarDateText">สร้างวันที่ ...</span>
            <button class="btn-primary btn-submit-task" id="btnSubmitTask">เพิ่มงาน</button>
        </div>
    </aside>

    <script src="index.js" type="module"></script>
</body>
</html>
