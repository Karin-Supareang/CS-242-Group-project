<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vFAST - Login & Register</title>
    <!-- Use global variables from index.css -->
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="login.css">
    <!-- <script src="https://accounts.google.com/gsi/client" async defer></script> -->
</head>
<body class="light-theme">
    <script>
        (function () {
            const saved = localStorage.getItem('theme') || 'light';
            document.body.classList.remove('light-theme', 'dark-theme');
            document.body.classList.add(saved + '-theme');
        })();
    </script>
    <div class="login-container">
        <div class="login-card">
            <br>
            <h1>Soft blooming</h1>
            <br>
            <br>
            <!-- Login Section -->
            <div id="loginSection">
                <div id="loginError" class="error-msg" style="display: none;"></div>
                <form id="loginForm" novalidate>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="example@university.ac.th" required>
                        <span class="field-error" id="emailError"></span>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="********" required>
                        <span class="field-error" id="passwordError"></span>
                    </div>
                    <br>
                    <button type="submit" class="submit-btn">เข้าสู่ระบบ</button>
                </form>
                <br>
                <!-- Google Login Button -->
                <div class="google-login-wrapper">
                    <!-- คอมเมนต์ส่วนของปุ่ม Google เดิมเอาไว้
                    <div id="g_id_onload"
                         data-client_id="YOUR_GOOGLE_CLIENT_ID"
                         data-callback="handleGoogleLogin">
                    </div>
                    <div class="g_id_signin" data-type="standard" data-width="100%"></div>
                    -->
                    <button type="button" onclick="handleGoogleLogin()" style="width: 100%; background-color: #fff; color: #3c4043; border: 1px solid #dadce0; border-radius: 4px; padding: 8px 16px; font-size: 14px; font-weight: 500; font-family: 'Roboto', sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 2px 0 rgba(60,64,67,.3); transition: background-color .218s ease; height: 40px;">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo" style="width: 18px; height: 18px; margin-right: 10px;">
                        Sign in with Google
                    </button>
                </div>

                <p class="toggle-link">ยังไม่มีบัญชี? <a href="#" id="toRegister">สมัครสมาชิก</a></p>
            </div>

            <!-- Register Section -->
            <div id="registerSection" style="display: none;">
                <h3 style="margin-top:0; color:var(--accent);">สมัครสมาชิก</h3>
                <div id="registerError" class="error-msg" style="display: none;"></div>
                <form id="registerForm" novalidate>
                    <div class="name-row">
                        <div class="input-group">
                            <label>ชื่อ</label>
                            <input type="text" id="regFirstName" placeholder="ชื่อจริง" required>
                        </div>
                        <div class="input-group">
                            <label>นามสกุล</label>
                            <input type="text" id="regLastName" placeholder="นามสกุล" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" placeholder="example@university.ac.th" required>
                        <span class="field-error" id="regEmailError"></span>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="regPassword" placeholder="********" required>
                        <span class="field-error" id="regPasswordError"></span>
                    </div>
                    <button type="submit" class="submit-btn">ลงทะเบียน</button>
                </form>
                <p class="toggle-link">มีบัญชีอยู่แล้ว? <a href="#" id="toLogin">เข้าสู่ระบบ</a></p>
            </div>
            <br>
            <br>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
