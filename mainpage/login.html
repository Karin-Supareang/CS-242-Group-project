<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vFAST - Login & Register</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>vFAST</h1>
            <p class="subtitle">ระบบส่งงาน</p>

            <div class="role-selector">
                <button class="role-btn active">อาจารย์</button>
                <button class="role-btn">นักศึกษา</button>
            </div>

            <div id="loginSection">
                <form id="loginForm">
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="example@university.ac.th" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="********" required>
                    </div>
                    <button type="submit" class="submit-btn">เข้าสู่ระบบ</button>
                </form>
                <p class="toggle-link">ยังไม่มีบัญชี? <a href="#" id="toRegister">สมัครสมาชิก</a></p>
            </div>

            <div id="registerSection" style="display: none;">
                <h3 style="margin-top:0; color:#4e54a4;">สมัครสมาชิก</h3>
                <form id="registerForm">
                    <div class="name-row">
                        <div class="input-group">
                            <label>ชื่อ</label>
                            <input type="text" placeholder="ชื่อจริง" required>
                        </div>
                        <div class="input-group">
                            <label>นามสกุล</label>
                            <input type="text" placeholder="นามสกุล" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" placeholder="example@university.ac.th" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" placeholder="********" required>
                    </div>
                    <button type="submit" class="submit-btn">ลงทะเบียน</button>
                </form>
                <p class="toggle-link">มีบัญชีอยู่แล้ว? <a href="#" id="toLogin">เข้าสู่ระบบ</a></p>
            </div>

        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
